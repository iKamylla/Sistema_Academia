<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boost Academia - Cadastrar Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-boost" href="index.html">⚡ Boost Academia</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="cadastrar_aluno.html">Cadastrar Aluno</a></li>
                        <li class="nav-item"><a class="nav-link" href="listar_aluno.html">Listagem de Alunos</a></li>
                        <li class="nav-item"><a class="nav-link" href="cadastrar_instrutor.html">Cadastrar Instrutor</a></li>
                        <li class="nav-item"><a class="nav-link" href="listar_instrutor.html">Listagem de Instrutores</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-4">
        <div class="bg-boost-dark p-4 rounded shadow-sm max-width-form mx-auto" style="max-width: 600px;">
            <h2 class="fw-bold text-white mb-4">Cadastro de Aluno</h2>
            
            <form action="listar_aluno.html" method="GET">
                <div class="mb-3">
                    <label for="nome" class="form-label text-white">Nome Completo</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nome" required>
                </div>

                <div class="mb-3">
                    <label for="cpf" class="form-label text-white">CPF</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-white">E-mail</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" required>
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label text-white">Telefone</label>
                    <input type="tel" class="form-control bg-dark text-white border-secondary" id="telefone" placeholder="(69) 99999-9999" required>
                </div>

                <div class="mb-3">
                    <label for="plano" class="form-label text-white">Plano Contratado</label>
                    <select class="form-select bg-dark text-white border-secondary" id="plano" required>
                        <option value="" selected disabled>Escolha um plano...</option>
                        <option value="mensal">Mensal - R$ 99,90</option>
                        <option value="trimestral">Trimestral - R$ 89,90/mês</option>
                        <option value="anual">Anual - R$ 69,90/mês</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-boost w-100 mt-3">Salvar Cadastro</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
