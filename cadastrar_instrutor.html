<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boost Academia - Cadastrar Instrutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-boost" href="index.html">⚡ Boost Academia</a>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="cadastrar_aluno.html">Cadastrar Aluno</a></li>
                        <li class="nav-item"><a class="nav-link" href="listar_aluno.html">Listagem de Alunos</a></li>
                        <li class="nav-item"><a class="nav-link active" href="cadastrar_instrutor.html">Cadastrar Instrutor</a></li>
                        <li class="nav-item"><a class="nav-link" href="listar_instrutor.html">Listagem de Instrutores</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-4">
        <div class="bg-boost-dark p-4 rounded shadow-sm mx-auto" style="max-width: 600px;">
            <h2 class="fw-bold text-white mb-4">Cadastro de Instrutor</h2>
            
            <form action="listar_instrutor.html" method="GET">
                <div class="mb-3">
                    <label for="nome" class="form-label text-white">Nome Completo</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nome" required>
                </div>

                <div class="mb-3">
                    <label for="cpf" class="form-label text-white">CPF</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="cpf" placeholder="000.000.000-00" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label text-white">E-mail</label>
                    <input type="email" class="form-control bg-dark text-white border-secondary" id="email" required>
                </div>

                <div class="mb-3">
                    <label for="especialidade" class="form-label text-white">Especialidade Principal</label>
                    <select class="form-select bg-dark text-white border-secondary" id="especialidade" required>
                        <option value="" selected disabled>Escolha uma área...</option>
                        <option value="musculacao">Musculação</option>
                        <option value="crossfit">Crossfit</option>
                        <option value="funcional">Treinamento Funcional</option>
                        <option value="dança">Dança / Zumba</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label text-white d-block">Turno de Trabalho</label>
                    <div class="form-check form-check-inline text-white">
                        <input class="form-check-input" type="radio" name="turno" id="manha" value="manha" checked>
                        <label class="form-check-label" for="manha">Manhã</label>
                    </div>
                    <div class="form-check form-check-inline text-white">
                        <input class="form-check-input" type="radio" name="turno" id="tarde" value="tarde">
                        <label class="form-check-label" for="tarde">Tarde</label>
                    </div>
                    <div class="form-check form-check-inline text-white">
                        <input class="form-check-input" type="radio" name="turno" id="noite" value="noite">
                        <label class="form-check-label" for="noite">Noite</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-boost w-100 mt-3">Salvar Cadastro</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
